name: Dev Image

on:
  push:
    branches: [development]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # release-please's dry-run reads associated-PR data via GraphQL to
      # compute the next version; it writes nothing, but that read still
      # needs this scope declared (an omitted scope defaults to none).
      pull-requests: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 26

      # Computes what the next release-please PR/version would be, without
      # creating or updating anything (--dry-run) — no PR, no tag, no push.
      # This is purely a read against GitHub's API, independent of main's own
      # release-please bookkeeping (see .github/workflows/release.yml).
      - name: Compute next version
        id: version
        run: |
          title=$(npx --yes release-please release-pr \
            --repo-url="${{ github.repository }}" \
            --token="${{ secrets.GITHUB_TOKEN }}" \
            --target-branch=development \
            --config-file=release-please-config.json \
            --manifest-file=.release-please-manifest.json \
            --dry-run | grep '^title:')
          version=$(echo "$title" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [ -z "$version" ]; then
            echo "Could not parse a version from: $title" >&2
            exit 1
          fi
          short_sha="${GITHUB_SHA:0:7}"
          echo "dev_tag=${version}-dev.${{ github.run_number }}.${short_sha}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.blog
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jonathanschwarzhaupt/home-blog:${{ steps.version.outputs.dev_tag }}
            ghcr.io/jonathanschwarzhaupt/home-blog:dev

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.migrate
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jonathanschwarzhaupt/home-blog-migrate:${{ steps.version.outputs.dev_tag }}
            ghcr.io/jonathanschwarzhaupt/home-blog-migrate:dev
