name: RC Image

# Builds once per completed story, not once per issue: a story/* branch (or a
# standalone feature/* branch, for an issue that isn't part of a bigger
# story) opens a PR into main once that unit of work is complete (opened
# builds it), and any further push while that PR stays open (e.g. a fix-up
# merge) rebuilds it (synchronize) — see
# docs/adr/0010-retire-development-for-trunk-based-release-please.md.
on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  build-and-push:
    # Same-repo PRs only (no forks) — main is the sole trunk now, so any
    # same-repo PR into it is a legitimate release-candidate build; there's
    # no single fixed source-branch name to check anymore (story/* branches
    # are named per story, not a single constant). Explicitly excludes
    # release-please's own Release PR (branch name is always exactly
    # "release-please--branches--main" for this repo's single-root-package
    # config — confirmed against release-please's own BranchName class,
    # src/util/branch-name.ts): it's a real same-repo PR against main,
    # created via RELEASE_PLEASE_TOKEN specifically so it CAN trigger
    # downstream workflows (see CODING_STANDARDS.md's release-please
    # configuration note) — without this exclusion, every commit landing on
    # main would also re-trigger a full rc build+push+tag cycle against
    # release-please's own bookkeeping PR, which is never something anyone
    # actually wants to test.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref != 'release-please--branches--main'
    runs-on: ubuntu-latest
    permissions:
      # Needed to push the rc git tag created below (see ADR-0010 for why
      # that's safe against release-please's own tag/version bookkeeping).
      contents: write
      # release-please's dry-run reads associated-PR data via GraphQL to
      # compute the next version; it writes nothing, but that read still
      # needs this scope declared (an omitted scope defaults to none).
      pull-requests: read
      packages: write
    steps:
      # A pull_request event's default ref/GITHUB_SHA is GitHub's ephemeral
      # test-merge commit, not the PR's real head — checking that out (and
      # tagging/building it) would tag a commit that never actually lands in
      # main's real history. Pin to the actual head commit instead.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 26

      # Computes what the next release-please PR/version would be, without
      # creating or updating anything (--dry-run) — no PR, no tag, no push.
      # This is purely a read against GitHub's API, independent of main's own
      # release-please bookkeeping (see .github/workflows/release.yml).
      - name: Compute next version
        id: version
        run: |
          title=$(npx --yes release-please release-pr \
            --repo-url="${{ github.repository }}" \
            --token="${{ secrets.GITHUB_TOKEN }}" \
            --target-branch=main \
            --config-file=release-please-config.json \
            --manifest-file=.release-please-manifest.json \
            --dry-run | grep '^title:')
          version=$(echo "$title" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [ -z "$version" ]; then
            echo "Could not parse a version from: $title" >&2
            exit 1
          fi
          short_sha="$(git rev-parse --short=7 HEAD)"
          echo "rc_tag=${version}-rc.${{ github.run_number }}.${short_sha}" >> "$GITHUB_OUTPUT"

      # A real git tag (not just a Docker image tag) at the exact commit
      # being built, so internal/vcs.Version() — which reads bi.Main.Version,
      # itself computed from git tags — reports this string instead of a
      # bare commit SHA. Created (and pushed) before the docker build steps:
      # Dockerfile.blog's COPY . . copies this checkout's .git as-is, so the
      # tag must exist locally before that copy happens for Go's VCS
      # stamping to see it. Never wrapped in an actual GitHub Release, and
      # never cleaned up — see ADR-0010.
      - name: Tag this build
        run: |
          tag="v${{ steps.version.outputs.rc_tag }}"
          git tag "$tag"
          git push origin "$tag"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.blog
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jonathanschwarzhaupt/home-blog:${{ steps.version.outputs.rc_tag }}
            ghcr.io/jonathanschwarzhaupt/home-blog:rc

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.migrate
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jonathanschwarzhaupt/home-blog-migrate:${{ steps.version.outputs.rc_tag }}
            ghcr.io/jonathanschwarzhaupt/home-blog-migrate:rc
